<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 3200" width="1400" height="3200">
  <defs>
    <style>
      .title { font: bold 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #111827; }
      .subtitle { font: 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #4b5563; }
      .step-title { font: bold 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1e3a5f; }
      .entity { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #111827; }
      .legend { font: 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #374151; }
      .arrow { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .box-ok { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; }
      .box-partial { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2; }
      .box-missing { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; }
      .group { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 12; }
      .status-ok { fill: #059669; font-weight: bold; }
      .status-partial { fill: #d97706; font-weight: bold; }
      .status-missing { fill: #dc2626; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="700" y="45" text-anchor="middle" class="title">Ashby Recruiter Process to Phenom Entity Mapping</text>
  <text x="700" y="72" text-anchor="middle" class="subtitle">End-to-end flow from docs.ashbyhq.com/getting-started-for-recruiters vs job-domain-v8 ERD</text>

