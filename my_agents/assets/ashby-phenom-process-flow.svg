  <text x="700" y="2265" text-anchor="middle" class="subtitle">Job � JobPost � Candidate � Application � Interview � Offer � Hired</text>
  <text x="700" y="2295" text-anchor="middle" class="subtitle">+ JobHiringTeamMember, JobInterviewPlan, Scorecards, Approvals, CustomFields</text>

