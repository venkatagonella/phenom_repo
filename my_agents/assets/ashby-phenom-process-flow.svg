  <text x="120" y="2530" class="legend">5. ApplicationRequest</text>
  <text x="120" y="2555" class="legend">6. ScheduleInterviewActivity</text>
  <text x="120" y="2580" class="legend">7. DirectBookingLink</text>
  <text x="120" y="2605" class="legend">8. CandidateAvailabilityLink</text>
  <text x="500" y="2430" class="legend">9. SharedCalendar</text>
  <text x="500" y="2455" class="legend">10. MeetingHours</text>
  <text x="500" y="2480" class="legend">11. GroupedInterviewPlan</text>
  <text x="500" y="2505" class="legend">12. OfferLetterTemplate</text>
  <text x="500" y="2530" class="legend">13. ESignatureOffer</text>
  <text x="500" y="2555" class="legend">14. Opening (Openings Management)</text>
  <text x="500" y="2580" class="legend">15. Employee (HRIS record)</text>
  <text x="500" y="2605" class="legend">16. PersonalNotificationSettings</text>
  <text x="500" y="2630" class="legend">17. CandidateImportBatch</text>

  <text x="100" y="2680" class="subtitle">Source: https://docs.ashbyhq.com/getting-started-for-recruiters | Phenom: job-domain-v8 ERD</text>
